  - "Grok (xAI)"
  - "GitHub Copilot"

ai_usage_summary: |
  Primary development was done in Antigravity (main coding environment) with heavy assistance from Grok (xAI) and Claude.
  
  - Grok was used extensively for overall architecture design, advanced scoring logic, honeypot detection heuristics, dynamic reasoning generator, and iterative improvements to the ranking system.
  - Claude was primarily used for code review, refactoring suggestions, and detailed feedback on reasoning quality to ensure Stage 4 compliance.
  - GitHub Copilot was used for code completion and boilerplate.
  - Antigravity served as the main IDE/environment for writing, testing, and debugging the entire solution.
  
  No raw candidate data was ever fed into any LLM. All core scoring components, keyword sets, penalty rules, and reasoning templates were designed manually with AI assistance only for refinement and review. The final implementation reflects significant original engineering work.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Deterministic rule-based ranker with five scoring components:
    (1) Career Match [0.42] — classifies roles into Tier 1 (explicit ML/AI/Search
    titles), Tier 2 (Backend/Data with ≥3 retrieval/LLM keyword matches in
    descriptions), or Tier 3 (generic). Uses log-scaled unique keyword counts
    across three semantic groups (IR, LLM, Production) to prevent keyword stuffing.
    (2) Skills Relevance [0.18] — relevance × proficiency × log(1+endorsements) ×
    duration factor, with platform assessment verification multiplier.
    (3) Behavioral [0.22] — recruiter response rate, last-active recency, location
    alignment, GitHub activity, recruiter saves, notice period modifier.
    (4) Experience+Education [0.10] — optimal YoE band (5–9 yr), Tier-1/2 prestige.
    (5) Honeypot/Trap Penalty [up to -0.10] — detects impossible date math,
    single role exceeding total YoE, expert skills with zero duration, skill count
    anomalies, and pure consulting histories.
    Reasoning is generated from atomic profile facts (exact YoE, title, company,
    named skills, signal values) with 5 rotating phrasings per signal type and
    honest concerns stated for every flagged candidate. Runtime: ~60s for 100K
    profiles on a single CPU core.

